name: Deploy Selected Java Microservices

on:
  workflow_dispatch:
    inputs:
      Info_Service:
        description: "Deploy Info-Service"
        required: true
        type: boolean
        default: false

      Health_Service:
        description: "Deploy Health-Service"
        required: true
        type: boolean
        default: false

      Hostname_Service:
        description: "Deploy Hostname-Service"
        required: true
        type: boolean
        default: false
     
      All_Services:
        description: "Deploy All Services\n(Overrides individual selections)"
        required: true
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Validate selection
        run: |
          if [ "${{ inputs.deploy_all }}" != "true" ] && \
             [ "${{ inputs.deploy_info_service }}" != "true" ] && \
             [ "${{ inputs.deploy_health_service }}" != "true" ] && \
             [ "${{ inputs.deploy_hostname_service }}" != "true" ]; then
            echo "Error: select at least one service or choose deploy_all."
            exit 1
          fi

      - name: Checkout Test-Feature branch
        uses: actions/checkout@v4
        with:
          ref: Test-Feature

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build selected service(s)
        run: |
          set -e

          if [ "${{ inputs.deploy_all }}" = "true" ] || [ "${{ inputs.deploy_info_service }}" = "true" ]; then
            echo "Building info-service"
            cd info-service
            mvn clean package -DskipTests
            cd ..
          fi

          if [ "${{ inputs.deploy_all }}" = "true" ] || [ "${{ inputs.deploy_health_service }}" = "true" ]; then
            echo "Building health-service"
            cd health-service
            mvn clean package -DskipTests
            cd ..
          fi

          if [ "${{ inputs.deploy_all }}" = "true" ] || [ "${{ inputs.deploy_hostname_service }}" = "true" ]; then
            echo "Building hostname-service"
            cd hostname-service
            mvn clean package -DskipTests
            cd ..
          fi

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Ensure target directories exist on EC2
        run: |
          ssh ubuntu@${{ secrets.EC2_HOST }} "
            mkdir -p /home/ubuntu/microservices/info-service &&
            mkdir -p /home/ubuntu/microservices/health-service &&
            mkdir -p /home/ubuntu/microservices/hostname-service
          "

      - name: Upload selected service(s)
        run: |
          set -e

          if [ "${{ inputs.deploy_all }}" = "true" ] || [ "${{ inputs.deploy_info_service }}" = "true" ]; then
            scp info-service/target/info-service-0.0.1-SNAPSHOT.jar \
              ubuntu@${{ secrets.EC2_HOST }}:/home/ubuntu/microservices/info-service/
          fi

          if [ "${{ inputs.deploy_all }}" = "true" ] || [ "${{ inputs.deploy_health_service }}" = "true" ]; then
            scp health-service/target/health-service-0.0.1-SNAPSHOT.jar \
              ubuntu@${{ secrets.EC2_HOST }}:/home/ubuntu/microservices/health-service/
          fi

          if [ "${{ inputs.deploy_all }}" = "true" ] || [ "${{ inputs.deploy_hostname_service }}" = "true" ]; then
            scp hostname-service/target/hostname-service-0.0.1-SNAPSHOT.jar \
              ubuntu@${{ secrets.EC2_HOST }}:/home/ubuntu/microservices/hostname-service/
          fi

      - name: Restart selected service(s)
        run: |
          set -e

          ssh ubuntu@${{ secrets.EC2_HOST }} "sudo systemctl daemon-reload"

          if [ "${{ inputs.deploy_all }}" = "true" ] || [ "${{ inputs.deploy_info_service }}" = "true" ]; then
            ssh ubuntu@${{ secrets.EC2_HOST }} "sudo systemctl restart info-service"
          fi

          if [ "${{ inputs.deploy_all }}" = "true" ] || [ "${{ inputs.deploy_health_service }}" = "true" ]; then
            ssh ubuntu@${{ secrets.EC2_HOST }} "sudo systemctl restart health-service"
          fi

          if [ "${{ inputs.deploy_all }}" = "true" ] || [ "${{ inputs.deploy_hostname_service }}" = "true" ]; then
            ssh ubuntu@${{ secrets.EC2_HOST }} "sudo systemctl restart hostname-service"
          fi

      - name: Show status for selected service(s)
        run: |
          if [ "${{ inputs.deploy_all }}" = "true" ] || [ "${{ inputs.deploy_info_service }}" = "true" ]; then
            ssh ubuntu@${{ secrets.EC2_HOST }} "sudo systemctl status info-service --no-pager"
          fi

          if [ "${{ inputs.deploy_all }}" = "true" ] || [ "${{ inputs.deploy_health_service }}" = "true" ]; then
            ssh ubuntu@${{ secrets.EC2_HOST }} "sudo systemctl status health-service --no-pager"
          fi

          if [ "${{ inputs.deploy_all }}" = "true" ] || [ "${{ inputs.deploy_hostname_service }}" = "true" ]; then
            ssh ubuntu@${{ secrets.EC2_HOST }} "sudo systemctl status hostname-service --no-pager"
          fi

      - name: Show deployed endpoints
        run: |
          echo "Deployment completed."

          if [ "${{ inputs.deploy_all }}" = "true" ] || [ "${{ inputs.deploy_info_service }}" = "true" ]; then
            echo "Info Service     -> http://${{ secrets.EC2_HOST }}:8090/info"
          fi

          if [ "${{ inputs.deploy_all }}" = "true" ] || [ "${{ inputs.deploy_health_service }}" = "true" ]; then
            echo "Health Service   -> http://${{ secrets.EC2_HOST }}:8091/health"
          fi

          if [ "${{ inputs.deploy_all }}" = "true" ] || [ "${{ inputs.deploy_hostname_service }}" = "true" ]; then
            echo "Hostname Service -> http://${{ secrets.EC2_HOST }}:8092/hostname"
          fi
